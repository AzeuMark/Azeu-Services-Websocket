<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Azeu Admin — Access Authentication">
    <title>Azeu Admin — Access Verification</title>
    <link rel="icon" type="image/x-icon" href="images/website-logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="auth.css">
    <script>
        // Apply theme immediately before rendering to prevent screen flash
        const savedTheme = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', savedTheme === 'light' ? 'light' : 'dark');
    </script>
</head>
<body>
    <!-- Theme Toggle (Fixed Top Right) -->
    <div class="auth-theme-wrap">
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle Theme">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <!-- Background glowing decorative meshes -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-card" id="authCard">
            <div class="auth-header">
                <div class="logo-container">
                    <img src="images/website-logo.ico" alt="Azeu Logo" class="auth-logo-img">
                </div>
                <h1 class="auth-title">Azeu Admin</h1>
                <p class="auth-subtitle">Enter the 6-digit verification code to unlock the control panel.</p>
            </div>

            <form class="auth-form" id="authForm" onsubmit="event.preventDefault(); verifyCode();">
                <!-- 6-digit inputs container -->
                <div class="pin-inputs-wrap">
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="pin-input" required>
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="pin-input" required>
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="pin-input" required>
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="pin-input" required>
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="pin-input" required>
                    <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="pin-input" required>
                </div>

                <div id="errorMessage" class="error-msg">
                    <i class="bi bi-exclamation-triangle-fill"></i> <span>Incorrect code. Please try again.</span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Verify Access Code</span>
                    <i class="bi bi-arrow-right-short"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        /* =======================================================
           GLOBAL CONFIGURATION
           ======================================================= */
        // Change the dashboard entry code here
        const ACCESS_CODE = "123456";

        /* =======================================================
           THEME TOGGLER
           ======================================================= */
        const themeBtn = document.getElementById('themeToggleBtn');
        
        function updateThemeUI(theme) {
            themeBtn.innerHTML = theme === 'light' 
                ? '<i class="bi bi-moon-stars-fill"></i>' 
                : '<i class="bi bi-sun-fill"></i>';
        }

        // Initialize UI icon
        updateThemeUI(document.documentElement.getAttribute('data-theme'));

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        });

        /* =======================================================
           6-DIGIT PIN FOCUS FLOW & AUTO SUBMIT
           ======================================================= */
        const inputs = document.querySelectorAll('.pin-input');
        const authCard = document.getElementById('authCard');
        const errorEl = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        inputs.forEach((input, index) => {
            // Clear any error state on typing
            input.addEventListener('input', (e) => {
                const val = e.target.value;
                errorEl.classList.remove('visible');
                authCard.classList.remove('shake');
                
                // Allow only numbers
                if (val && !/^[0-9]$/.test(val)) {
                    e.target.value = '';
                    return;
                }

                if (val && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }

                // If all fields are filled, auto-trigger check
                if (Array.from(inputs).every(inp => inp.value !== "")) {
                    verifyCode();
                }
            });

            // Handle backspace key
            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace") {
                    errorEl.classList.remove('visible');
                    authCard.classList.remove('shake');
                    
                    if (!input.value && index > 0) {
                        inputs[index - 1].value = '';
                        inputs[index - 1].focus();
                    } else {
                        input.value = '';
                    }
                }
            });

            // Handle paste action
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();
                
                if (/^\d{6}$/.test(pasteData)) {
                    inputs.forEach((inp, idx) => {
                        inp.value = pasteData[idx];
                    });
                    verifyCode();
                }
            });
        });

        // Autofocus first input on load
        window.addEventListener('DOMContentLoaded', () => {
            inputs[0].focus();
        });

        /* =======================================================
           CODE VALIDATION LOGIC
           ======================================================= */
        function verifyCode() {
            let entered = "";
            inputs.forEach(inp => entered += inp.value);

            if (entered.length < 6) return;

            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            setTimeout(() => {
                if (entered === ACCESS_CODE) {
                    // Success action
                    submitBtn.classList.remove('loading');
                    submitBtn.classList.add('success');
                    submitBtn.innerHTML = '<span class="btn-text">Access Granted!</span> <i class="bi bi-check-circle-fill"></i>';
                    
                    // Store authenticated status
                    localStorage.setItem('azeu_dashboard_auth', 'authenticated');

                    setTimeout(() => {
                        window.location.replace('index.html');
                    }, 800);
                } else {
                    // Fail action
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    errorEl.classList.add('visible');
                    authCard.classList.add('shake');
                    
                    // Reset input fields and focus first one
                    inputs.forEach(inp => inp.value = "");
                    inputs[0].focus();
                }
            }, 600);
        }
    </script>
</body>
</html>

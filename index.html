<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azeu Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="bi bi-shield-check-fill sidebar-logo"></i>
                <span class="sidebar-brand">Azeu Admin</span>
            </div>
            
            <nav class="sidebar-nav">
                <div class="sidebar-label">Main Menu</div>
                <a href="#" class="nav-item active"><i class="bi bi-speedometer2"></i> Dashboard</a>
                
                <div class="sidebar-label">Global Actions</div>
                <button class="nav-btn" onclick="openMsgModal('ALL')"><i class="bi bi-chat-dots"></i> Message All</button>
                <button class="nav-btn" onclick="openNavModal('ALL')"><i class="bi bi-globe"></i> Navigate All</button>
                <button class="nav-btn" onclick="confirmGlobalRefresh()"><i class="bi bi-camera"></i> Refresh Screens</button>
                <button class="nav-btn" onclick="commitGlobalBypass()"><i class="bi bi-unlock"></i> Bypass All</button>
                
                <div class="sidebar-label">System</div>
                <button class="nav-btn danger-text" id="global-restart" onclick="confirmGlobalPower('RESTART')"><i class="bi bi-arrow-clockwise"></i> Restart All</button>
                <button class="nav-btn danger-bg" id="global-shutdown" onclick="confirmGlobalPower('SHUTDOWN')"><i class="bi bi-power"></i> Shutdown All</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Search connected PCs...">
                </div>
                <div class="header-actions">
                    <div id="connectionStatus" class="status-indicator online">
                        <span class="pulse"></span> Server Active
                    </div>
                    <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                </div>
            </header>

            <div class="content-body">
                <div class="section">
                    <div class="section-title">
                        <i class="bi bi-pc-display-horizontal"></i> Active PCs
                        <span class="badge badge-success" id="active-count">0</span>
                    </div>
                    <div id="active-container" class="grid"></div>
                </div>

                <div class="section">
                    <div class="section-title">
                        <i class="bi bi-pc-display"></i> Inactive PCs
                        <span class="badge badge-secondary" id="inactive-count">0</span>
                    </div>
                    <div id="inactive-container" class="grid"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="msgModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="msgTargetName"><i class="bi bi-chat-dots"></i> Send Message</h2>
            <textarea id="msgInput" placeholder="Enter your message to the user..."></textarea>
            <div class="modal-footer">
                <button class="btn-action" onclick="closeModal('msgModal')">Cancel</button>
                <button class="btn-action primary" onclick="commitSendMessage()">Send Message</button>
            </div>
        </div>
    </div>

    <div id="navModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="navTargetName"><i class="bi bi-globe"></i> Navigate PC to URL</h2>
            <input type="text" id="navInput" placeholder="https://example.com">
            <div class="modal-footer">
                <button class="btn-action" onclick="closeModal('navModal')">Cancel</button>
                <button class="btn-action primary" onclick="commitNavigate()">Navigate Now</button>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox-overlay">
        <div class="lightbox-panel">
            <div class="lightbox-header">
                <span class="lightbox-title" id="lightboxTitle"><i class="bi bi-image"></i> Screenshot</span>
                <div class="lightbox-actions">
                    <button class="btn-action primary" id="downloadBtn"><i class="bi bi-download"></i> Download</button>
                    <button class="btn-close-modal" onclick="document.getElementById('lightbox').classList.remove('active')"><i class="bi bi-x-lg"></i></button>
                </div>
            </div>
            <div class="lightbox-body">
                <img id="lightboxImg" alt="Screenshot">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (localStorage.getItem('azeu_dashboard_auth') !== 'authenticated') {
            window.location.replace('auth.html');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Azeu Admin — Remote PC Management Dashboard">
    <title>Azeu Dashboard</title>
    <link rel="icon" type="image/x-icon" href="images/website-logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="dashboard-layout">

        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ===================== SIDEBAR ===================== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo-wrap">
                    <img src="images/website-logo.ico" alt="Azeu Logo" class="sidebar-logo-img">
                </div>
                <div class="sidebar-brand-wrap">
                    <span class="sidebar-brand">Azeu Admin</span>
                    <span class="sidebar-version">Remote Manager</span>
                </div>
                <button class="sidebar-close-btn" id="sidebarCloseBtn" title="Close Menu">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-label">Main Menu</div>
                <a href="#" class="nav-item active" id="nav-dashboard">
                    <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
                </a>

                <div class="sidebar-label">Global Actions</div>
                <button class="nav-btn" id="nav-msg-all" onclick="openMsgModal('ALL')">
                    <i class="bi bi-chat-dots"></i> <span>Message All</span>
                </button>
                <button class="nav-btn" id="nav-nav-all" onclick="openNavModal('ALL')">
                    <i class="bi bi-globe"></i> <span>Navigate All</span>
                </button>
                <button class="nav-btn" id="nav-refresh-all" onclick="confirmGlobalRefresh()">
                    <i class="bi bi-camera"></i> <span>Refresh Screens</span>
                </button>
                <button class="nav-btn" id="nav-bypass-all" onclick="commitGlobalBypass()">
                    <i class="bi bi-unlock"></i> <span>Bypass All</span>
                </button>

                <div class="sidebar-label">System</div>
                <button class="nav-btn danger-text" id="global-restart" onclick="confirmGlobalPower('RESTART')">
                    <i class="bi bi-arrow-clockwise"></i> <span>Restart All</span>
                </button>
                <button class="nav-btn danger-bg" id="global-shutdown" onclick="confirmGlobalPower('SHUTDOWN')">
                    <i class="bi bi-power"></i> <span>Shutdown All</span>
                </button>
                <div class="sidebar-label">Session</div>
                <button class="nav-btn" id="nav-logout" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
                </button>
            </nav>
        </aside>

        <!-- ===================== MAIN ===================== -->
        <main class="main-content">

            <!-- Top header -->
            <header class="top-header">
                <div class="header-left">
                    <button class="hamburger-btn" id="hamburgerBtn" title="Open Menu">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                    </button>
                    <div class="header-time-wrap">
                        <i class="bi bi-clock"></i>
                        <span id="manila-time">--:--:-- -- • Manila</span>
                    </div>
                </div>
                <div class="header-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="pc-search" placeholder="Search connected PCs...">
                </div>
                <div class="header-sort">
                    <button class="sort-toggle-btn" id="sortMenuBtn" onclick="toggleSortMenu(event)" title="Sort PCs">
                        <i class="bi bi-sort-down"></i> <span class="sort-label-text">Sort By</span>
                    </button>
                    <div class="sort-menu-content" id="sortMenu">
                        <button onclick="setSort('name', 'asc')" class="sort-opt active" id="sort-opt-name-asc"><i class="bi bi-sort-alpha-down"></i> Name: A to Z</button>
                        <button onclick="setSort('name', 'desc')" class="sort-opt" id="sort-opt-name-desc"><i class="bi bi-sort-alpha-up"></i> Name: Z to A</button>
                        <button onclick="setSort('uptime', 'desc')" class="sort-opt" id="sort-opt-uptime-desc"><i class="bi bi-hourglass-split"></i> Uptime: Highest First</button>
                        <button onclick="setSort('uptime', 'asc')" class="sort-opt" id="sort-opt-uptime-asc"><i class="bi bi-hourglass"></i> Uptime: Lowest First</button>
                        <button onclick="setSort('afk', 'asc')" class="sort-opt" id="sort-opt-afk-asc"><i class="bi bi-person-check"></i> AFK: Active First</button>
                        <button onclick="setSort('afk', 'desc')" class="sort-opt" id="sort-opt-afk-desc"><i class="bi bi-person-dash"></i> AFK: Inactive First</button>
                        <button onclick="setSort('sync', 'desc')" class="sort-opt" id="sort-opt-sync-desc"><i class="bi bi-cloud-arrow-down"></i> Sync: Newest First</button>
                        <button onclick="setSort('sync', 'asc')" class="sort-opt" id="sort-opt-sync-asc"><i class="bi bi-cloud-arrow-up"></i> Sync: Oldest First</button>
                    </div>
                </div>
                <div class="header-actions">
                    <div id="connectionStatus" class="status-indicator online">
                        <span class="pulse"></span> <span class="status-text">Server Active</span>
                    </div>
                    <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                </div>
            </header>

            <!-- Content -->
            <div class="content-body">

                <!-- Active PCs -->
                <div class="section">
                    <div class="section-title">
                        <i class="bi bi-pc-display-horizontal"></i>
                        Active PCs
                        <span class="badge badge-success" id="active-count">0</span>
                        <div class="section-divider"></div>
                    </div>
                    <div id="active-container" class="grid"></div>
                </div>

                <!-- Inactive PCs -->
                <div class="section">
                    <div class="section-title">
                        <i class="bi bi-pc-display"></i>
                        Inactive PCs
                        <span class="badge badge-secondary" id="inactive-count">0</span>
                        <div class="section-divider"></div>
                    </div>
                    <div id="inactive-container" class="grid"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- ===================== MODALS ===================== -->

    <!-- Message Modal -->
    <div id="msgModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="msgTargetName"><i class="bi bi-chat-dots"></i> Send Message</h2>
            <textarea id="msgInput" placeholder="Enter your message to the user..."></textarea>
            <div class="modal-footer">
                <button class="btn-action" id="msg-cancel-btn" onclick="closeModal('msgModal')">
                    Cancel
                </button>
                <button class="btn-action primary" id="msg-send-btn" onclick="commitSendMessage()">
                    <i class="bi bi-send"></i> Send Message
                </button>
            </div>
        </div>
    </div>

    <!-- Navigate Modal -->
    <div id="navModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="navTargetName"><i class="bi bi-globe"></i> Navigate PC to URL</h2>
            <input type="text" id="navInput" placeholder="https://example.com">
            <div class="modal-footer">
                <button class="btn-action" id="nav-cancel-btn" onclick="closeModal('navModal')">
                    Cancel
                </button>
                <button class="btn-action primary" id="nav-go-btn" onclick="commitNavigate()">
                    <i class="bi bi-arrow-right-circle"></i> Navigate Now
                </button>
            </div>
        </div>
    </div>

    <!-- Screenshot Lightbox -->
    <div id="lightbox" class="lightbox-overlay">
        <div class="lightbox-panel">
            <div class="lightbox-header">
                <span class="lightbox-title" id="lightboxTitle">
                    <i class="bi bi-image"></i> Screenshot
                </span>
                <div class="lightbox-actions">
                    <button class="btn-action primary" id="downloadBtn">
                        <i class="bi bi-download"></i> Download
                    </button>
                    <button class="btn-close-modal" id="lightbox-close-btn"
                        onclick="document.getElementById('lightbox').classList.remove('active')">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
            <div class="lightbox-body">
                <img id="lightboxImg" alt="Screenshot">
            </div>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="customConfirmModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="confirmModalTitle">Confirm Action</h2>
            <p id="confirmModalMessage" class="confirm-modal-msg">Are you sure you want to proceed?</p>
            <div class="modal-footer">
                <button class="btn-action" id="confirmModalCancelBtn">
                    Cancel
                </button>
                <button class="btn-action primary" id="confirmModalBtn">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
